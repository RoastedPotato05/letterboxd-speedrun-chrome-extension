<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Letterboxd Speedrun</title>
  <link rel="stylesheet" href="styles.css" />

</head>
<body>
  <div class="container">
    <h1 style="font-size: 42px; font-family: 'Graphik', sans-serif; font-weight: 600; letter-spacing: -1px;">Letterboxd Speedrun</h1>

    <div id="victory" style="display:none; font-size: large; font-family: 'Graphik', sans-serif; font-weight: 600;" >
      <br>🎉 Yippeeee! </br>
      You reached the goal webpage.</br><br>
    </div>

    <div id="run-display" style="display: none;">
      <label for="goal"></label>
      <label for="path"></label>
    </div><br><br>

    <div class="search-block" id="search-block">
      <label style="font-size: large; font-family: 'Graphik', sans-serif; font-weight: 400; letter-spacing: 1px; color: #99AABB;">GOAL</label>
      <input id="search-goal" placeholder="Search goal (e.g. https://letterboxd.com/actor/zendaya/)" style="font-size: small; font-family: 'Graphik', sans-serif; font-weight: 400; letter-spacing: 1px; color: #f8f8f8;" autocomplete="off" />
    </div>

    
    

    <div id="buttons" style="width: 104%;">
      <div class="flex-child" style="width: 75%;">
        <button id="start-run" class="primary startRunHover" style="font-family: 'Graphik', sans-serif; font-weight: 600; font-size: 35px; height: 70px; background: #40BCF4;">Start Run</button>
      </div>
      <div class="flex-child" style="width: 82px;">
        <button id="random" class="primary" style="height: 70px; background: #FF8000; position: relative; top: 8px; right: -8%"><img src="\images\dice.png" style="width: 50px; height: 50px; position: relative; top: 3px"></button>
      </div>
    </div>

    <div><button id="return" class="primary" style="display:none; font-family: 'Graphik', sans-serif; font-weight: 600; font-size: 35px; height: 60px; background: #40BCF4;">Return</button></div>
    <div id ="exit-div" style="display:none;"><br><br><button class="primary" id="exit" style="font-family: 'Graphik', sans-serif; font-weight: 600; font-size: 35px; height: 60px; background: #FF8000;">Exit</button></div>
    
    <div id="status" class="status"></div>

    <hr style="width:100%"/>

    <footer style="background: #161c22; height: 90px">
      <div class="stopwatch-container" style="font-size: large; background: #161c22;">
        <strong><div id="display" style="font-family: 'Graphik', sans-serif; font-size: 76px; position: relative; left: 20px; top: -12px">
          <span id="minutes" style="color: #FF8000">00</span>:<span id="seconds" style="color: #00E054">00</span>.<span id="milliseconds" style="color: #40BCF4">000</span>
        </div></strong>
      </div>
    </footer>
  </div>
  <br><br><br><br><br><br><br><br>

  <script src="popup.js"></script>
</body>
</html>
